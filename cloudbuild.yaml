steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/deskmate-backend', './backend']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/deskmate-backend']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'deskmate-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/deskmate-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--memory'
      - '512Mi'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=$PROJECT_ID'

  # Print the deployed service URL
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'describe'
      - 'deskmate-backend'
      - '--region'
      - 'us-central1'
      - '--format'
      - 'value(status.url)'

images:
  - 'gcr.io/$PROJECT_ID/deskmate-backend'
