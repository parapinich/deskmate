<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeskMate — AI Study Coach</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>

  <!-- ============ CARD VIEW (initial) ============ -->
  <div id="card-view" class="card-view">
    <!-- Custom title bar for dragging -->
    <div class="card-titlebar" data-tauri-drag-region>
      <div class="card-titlebar-left">
        <span class="card-logo">🎓</span>
        <span class="card-brand">DeskMate</span>
      </div>
      <button class="card-close" onclick="closeApp()">✕</button>
    </div>

    <div class="card-body">
      <h2 class="card-title">Start a Study Session</h2>
      <p class="card-desc">I'll watch your screen and quiz you on what you're studying. Just open your study material
        and let me help! 📚</p>
      <button id="btn-start" class="card-btn" onclick="startSession()">
        ▶ Start Session
      </button>
    </div>
  </div>

  <!-- ============ BAR VIEW (active session) ============ -->
  <div id="bar-view" class="bar-view" style="display:none;">
    <!-- Toolbar -->
    <div class="toolbar" data-tauri-drag-region>
      <div class="toolbar-left">
        <span class="toolbar-logo">🎓</span>
        <div class="toolbar-status">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text" class="toolbar-status-text">Watching...</span>
        </div>
      </div>
      <div class="toolbar-right">
        <span class="toolbar-score" id="toolbar-score">0/0</span>
        <button class="toolbar-btn-icon" id="btn-history" onclick="toggleHistory()" title="Answer History">📋</button>
        <span class="toolbar-timer" id="session-timer">00:00</span>
        <button class="toolbar-btn-end" onclick="endSession()">⏹</button>
        <div class="toolbar-drag-handle" onmousedown="startDrag(event)" title="Drag to move">✥</div>
        <button class="toolbar-btn-toggle" id="btn-toggle" onclick="toggleQuestions()">▼</button>
      </div>
    </div>

    <!-- Questions Panel (extends downward) -->
    <div id="questions-panel" class="questions-panel">
      <div id="questions-container"></div>
    </div>

    <!-- History Panel -->
    <div id="history-panel" class="questions-panel">
      <div id="history-container"></div>
    </div>
  </div>

  <!-- ============ SUMMARY MODAL ============ -->
  <div id="summary-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>📊 Session Summary</h2>
      <div id="summary-body"></div>
      <button class="card-btn" onclick="closeSummary()">Close</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
